<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>span으로 메뉴 만들기</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        #div1
        {
            height: 50px;
            margin-top: 10px;
            margin-left: 30px;
        }
        span{
            display: block;
            border: 1px solid black;
            width: 90px;
            height: 30px;
            float: left;
        }
        span:first-child{
        border-radius: 10px 0 0 10px;
        }
        span:last-child{
            border-radius: 0 10px 10px 0;
        }
        #div2{
            background-color: yellow;
            height: 300px;
            width:500px;
            margin-left: 30px;
        }
    </style>
</head>
<body>
    <div id="total">
    <div id="div1">
        <span>메뉴1;</span><span>메뉴2</span>
    </div>
    <div id="div2"></div>

    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OOO의 홈페이지</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: "맑은 고딕", sans-serif;
    }

    body{
        background:#f5f5f5;
    }

    .container{
        width:90%;
        margin:50px auto;
        text-align:center;
    }

    h1{
        font-size:50px;
        margin-bottom:50px;
    }

    .menu-grid{
        display:grid;
        grid-template-columns: repeat(3, 1fr);
        gap:20px;
        max-width:1000px;
        margin:0 auto 50px;
    }

    .menu-box{
        border:1px solid #ccc;
        border-radius:12px;
        background:white;
        padding:25px;
        text-decoration:none;
        color:black;
        transition:0.3s;
    }

    .menu-box:hover{
        background:#e9f3ff;
        transform:translateY(-3px);
    }

    .menu-title{
        font-size:28px;
        font-weight:bold;
    }

    .menu-sub{
        font-size:20px;
        margin-top:10px;
    }

    .bottom-text{
        text-align:left;
        margin-top:50px;
        font-size:20px;
    }
</style>
</head>

<body>

<div class="container">

    <h1>서규범의 홈페이지</h1>

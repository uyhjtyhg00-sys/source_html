<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>티몬 페이지</title>
    <style>
        *{
            margin:0;
            padding: 0;
        }
        body{
            background-color: #f4f4f4;
        }
        #all{
            width: 800px;
            margin: 0 auto;
        }
        #header{
            height: 94px;
            position: relative;
        }
        #logo{
            position: absolute;
            top: 50px;
            left: 10px;
        }
        #interior{
            position: absolute;
            left: 320px;
        }
        #section{
            height: 30px;
            background-color: #2DBFB4 ;
            position: relative;
            text-align: right;
        }
        #thing{
            position: absolute;
            top:50%;
            left:50%;
            transform: translate(-50%, -50%);
        }
        section>b{
            position: absolute;
            top: 6px;
            left: 700px;
            font-size: 15px;
        }
        .div4{
            background-color: white;
            height: 330px;
        }
        .div4>img{
            width: 263px;
        }
    </style>
</head>
<body>
    <div class="all">
    <header>
        <img src="top_logo.jpg" alt="" id="logo">
        <img src="top_interior.jpg" alt="" id="interior">
    </header>
    <section>
        <img src="text_interior.jpg" alt="" id="thing">
        <b>2026.06.08</b>
    </section>
    <div id="div3">
        <img src="middle.jpg" alt="">
    </div>
    <div class="div4">
        <img src="tmon01.jpg" alt="">
        <br>
        <b class="ex1">티몬가</b>
        <b class="ex2">아직도 앉아 있나요? 바른<br>
        자세 스탠딩 책상</b>
    </div>
    <div class="div4 ml">
        <img src="tmon02.jpg" alt="">
        <br>
        <b class="ex1">티몬가</b>
        <b class="ex2">드라마 같은 홈스타일<br>
        분위기 있는 스탠드</b>
    </div>
    <div class="div4 ml">
        <img src="tmon03.jpg" alt="">
        <br>
        <b class="ex1">티몬가</b>
        <b class="ex2">집에서 하는 냅킨궁예</b>
    </div>
</div>
</body>
</html>
